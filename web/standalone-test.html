<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Standalone React Test</title>
<style>
body { background: #0d1117; color: #e6edf3; font-family: sans-serif; padding: 20px; }
h1 { color: #00d4ff; }
</style>
</head>
<body>
<h1>React Works!</h1>
<p>If you see this, JavaScript is working in the browser.</p>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement('div', null,
  React.createElement('h2', null, 'React 18 Rendered Successfully!'),
  React.createElement('p', null, 'The page is working correctly.')
));
</script>
</body>
</html>
